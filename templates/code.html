<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Playground - Smart Student Organizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/genz-theme.css">
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/static/theme.js" defer></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">📚 Smart Organizer</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/dashboard">Dashboard</a>
                <a class="nav-link" href="/files">Files</a>
                <a class="nav-link" href="/syllabus">Syllabus</a>
                <a class="nav-link" href="/notes">Notes</a>
                <a class="nav-link" href="/chat">AI Chat</a>
                <a class="nav-link active" href="/code">💻 Code Playground</a>
                <a class="nav-link" href="/calendar">Calendar</a>
                <a class="nav-link" href="/profile">Profile</a>
                <a class="nav-link" href="/logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <h2><i class="fas fa-laptop-code"></i> AI Code Playground <small class="text-muted">({{ username }})</small></h2>
        <div class="row">
            <div class="col-md-8">
                <div class="card h-100">
                    <div class="card-header d-flex justify-content-between">
                        <h5>🛠️ Code Editor</h5>
                        <div>
                            <select id="language" class="form-select form-select-sm me-2" style="width: auto;">
                                <option value="python">Python</option>
                                <option value="javascript">JavaScript</option>
                                <option value="cpp">C++</option>
                                <option value="java">Java</option>
                            </select>
                            <button id="runBtn" class="btn btn-success btn-sm">▶️ Run</button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div id="editor" style="height: 500px;"></div>
                    </div>
                    <div class="card-footer">
                        <div id="output" class="bg-dark text-white p-3 rounded" style="min-height: 100px; font-family: monospace;"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-header bg-gradient text-white">
                        <h5>🤖 AI Code Assistant</h5>
                    </div>
                    <div class="card-body p-0" style="height: 550px;">
                        <div id="code-chat" class="p-3" style="height: 450px; overflow-y: auto;">
                            <div class="message bot-message mb-3">
                                <strong>AI Coder:</strong> Hey {{ username }}! Paste your code or ask "Explain quicksort in Python" - I'll help! 🚀
                            </div>
                        </div>
                        <div class="card-footer p-3">
                            <div class="input-group">
                                <input type="text" id="code-input" class="form-control" placeholder="Ask AI about code...">
                                <button class="btn btn-primary" onclick="aiCodeHelp()">
                                    <i class="fas fa-magic"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
    <script>
        // Monaco-like Ace Editor
        const editor = ace.edit("editor");
        editor.setTheme("ace/theme/dracula");
        editor.session.setMode("ace/mode/python");
        
        document.getElementById('language').onchange = function() {
            const mode = this.value === 'python' ? 'python' : 
                        this.value === 'javascript' ? 'javascript' : 
                        this.value === 'cpp' ? 'c_cpp' : 'java';
            editor.session.setMode(`ace/mode/${mode}`);
        };
        
        document.getElementById('runBtn').onclick = function() {
            const code = editor.getValue();
            const output = document.getElementById('output');
            output.innerHTML = '<div class="loading text-info">Running...</div>';
            
            // Mock execution
            setTimeout(() => {
                if (code.includes('print')) {
                    output.innerHTML = '<pre class="text-success">Hello from AI Playground!\nCode executed successfully 🚀</pre>';
                } else {
                    output.innerHTML = '<pre class="text-warning">Code ready! Add print() to see output 📤</pre>';
                }
            }, 1000);
        };

        function aiCodeHelp() {
            const input = document.getElementById('code-input');
            const chat = document.getElementById('code-chat');
            const query = input.value.toLowerCase().trim();
            input.value = '';
            
            // User message
            chat.innerHTML += `<div class="message user-message mb-3"><strong>You:</strong> ${query}</div>`;
            
            // AI response
            setTimeout(() => {
                let response = "Here's some code:";
                if (query.includes('quicksort') || query.includes('sort')) {
                    response = `def quicksort(arr):
    if len(arr) <= 1:
        return arr
    pivot = arr[len(arr) // 2]
    left = [x for x in arr if x < pivot]
    middle = [x for x in arr if x == pivot]
    right = [x for x in arr if x > pivot]
    return quicksort(left) + middle + quicksort(right)

print(quicksort([3,6,8,10,1,2,1])) # Output: [1, 1, 2, 3, 6, 8, 10]`;
                    editor.setValue(response, -1);
                } else if (query.includes('hello')) {
                    response = `print("Hello World from AI! 👋")`;
                    editor.setValue(response, -1);
                } else if (query.includes('loop')) {
                    response = `for i in range(5):
    print(f"Loop {i}: Hello Gen Z coder! 🔥")`;
                    editor.setValue(response, -1);
                } else {
                    response = "Paste code or ask specific questions like 'quicksort' or 'for loop'! 💻";
                }
                chat.innerHTML += `<div class="message bot-message mb-3"><strong>AI Coder:</strong> ${response}</div>`;
                chat.scrollTop = chat.scrollHeight;
            }, 800);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
