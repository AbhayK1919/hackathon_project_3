<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Academic Organizer - Login</title>
<link rel="stylesheet" href="/static/genz-theme.css">
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="/static/theme.js" defer></script>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>🔐 Smart Organizer</h1>
<h2>Login Required</h2>
            {% if error %}
            <p style="color: red;">{{ error }}</p>
            {% endif %}
            <form action="/login" method="post">
                <input type="text" name="username" placeholder="Username" required maxlength="20">
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p>AI-Powered Academic Resource Management</p>
        </div>
    </div>
</body>
</html>
