<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ filename }} - {{ subject }} | Smart Student Organizer</title>
    <meta name="description" content="{{ desc }} - Free study notes, syllabus, lecture slides for college students. AI organized documents.">
    <meta property="og:title" content="{{ filename }} - {{ subject }}">
    <meta property="og:description" content="{{ desc }}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{ request.url }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/genz-theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">📚 Smart Organizer</a>
            <span class="navbar-text ms-auto">Public Document View</span>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card shadow-lg">
                    <div class="card-header bg-gradient text-white text-center py-4">
                        <h1 class="mb-1">{{ subject }} 📚</h1>
                        <h4 class="mb-0">{{ filename }}</h4>
                        <small>Shareable SEO Document Page</small>
                    </div>
                    <div class="card-body p-0">
                        <div class="ratio ratio-16x9">
                            <iframe src="/uploads/{{ filename }}" class="w-100 h-100 border-0" allowfullscreen></iframe>
                        </div>
                    </div>
                    <div class="card-footer text-center bg-light">
                        <a href="/uploads/{{ filename }}" class="btn btn-primary btn-lg me-2" target="_blank">📄 Download Original</a>
                        <a href="/files" class="btn btn-outline-secondary btn-lg">← Back to Organizer (Login Required)</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
