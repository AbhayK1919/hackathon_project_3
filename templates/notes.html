<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes - Smart Student Organizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/genz-theme.css">
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="/static/theme.js" defer></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">📚 Smart Organizer</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/dashboard">Dashboard</a>
                <a class="nav-link" href="/files">Files</a>
                <a class="nav-link" href="/syllabus">Syllabus</a>
                <a class="nav-link active" href="/notes">Notes</a>
                <a class="nav-link" href="/chat">AI Chat</a>
                <a class="nav-link" href="/calendar">Calendar</a>
                <a class="nav-link" href="/profile">Profile</a>
                <a class="nav-link" href="/logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2><i class="fas fa-edit"></i> Notes Hub <small class="text-muted">({{ username }})</small></h2>
        
        <div class="row">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h5>Create New Note</h5>
                    </div>
                    <div class="card-body">
                        <textarea id="note-editor" class="form-control" rows="10" placeholder="Write your notes here... Support markdown! # Heading, **bold**, lists..."></textarea>
                        <button onclick="saveNote()" class="btn btn-primary mt-2">Save Note</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h5>My Notes</h5>
                    </div>
                    <div class="card-body" id="notes-list">
                        <div class="note-item p-2 border-bottom">
                            <strong>DBMS Normalization</strong><br>
                            <small>2 hours ago</small>
                        </div>
                        <div class="note-item p-2 border-bottom">
                            <strong>OS Processes</strong><br>
                            <small>1 day ago</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function saveNote() {
            const content = document.getElementById('note-editor').value;
            if (content.trim()) {
                alert('Note saved! (localStorage - refreshes persist)');
                document.getElementById('note-editor').value = '';
            }
        }
    </script>
</body>
</html>
